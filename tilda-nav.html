  Архитектура:
    Profbroker/yacht-az-nav (публичный git)  ← источник

    innerHTML в #yz-nav-mount             ← рендер в Tilda Header

  AZ — главная без префикса (правило #5 hreflang_map.md), остальные
  AZ-страницы с префиксом /az/.

    - LOGO_URL: подменить на реальный URL из tildacdn
    - Instagram URL: проверить https://instagram.com/yacht.az
    - Telegram URL: проверить https://t.me/yachtaz

-->

<style>

  .yz-nav-burger {
    display: none;

    justify-content: center;
    gap: 5px;

  .yz-nav-mobile {
    position: fixed;

    gap: 4px;

  .yz-nav-mobile details {
    border-bottom: 1px solid var(--nav-rule);

  .yz-nav-mobile summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 0;
    font-size: 17px;
    font-weight: 500;
    color: var(--nav-ink);
    position: relative;
    padding-right: 36px;
  }
  .yz-nav-mobile summary::-webkit-details-marker { display: none; }
  .yz-nav-mobile summary::after {
    content: '';
    position: absolute;
    right: 8px;
    top: 50%;
    width: 10px;
    height: 10px;
    border-right: 2px solid var(--nav-ink-soft);
    border-bottom: 2px solid var(--nav-ink-soft);

  .yz-nav-mobile details ul {
    padding-bottom: 12px;
  }
  #yz-nav .yz-nav-mobile details a {
    display: block;
    padding: 10px 0 10px 16px;

<script>
(function () {
  /* ─── Lang detect.
     На /en/... → en
     На /az/... → az
     иначе → ru (default)
     Особый случай: главная yacht.az/ — без префикса = AZ (правило #5
     hreflang_map.md). Для главных страниц RU/EN — пути /ru/ и /en/. */
  var path = window.location.pathname;
  var lang;
  if (/^\/en(\/|$)/.test(path))      lang = 'en';
  else if (/^\/az(\/|$)/.test(path)) lang = 'az';
  else if (/^\/ru(\/|$)/.test(path)) lang = 'ru';
  else lang = 'az'; /* корень yacht.az/ → AZ */

  /* ─── Translations ──────────────────────────────── */
  var T = {
    ru: {
      'nav.baku':       'Яхтинг в Баку',
      'nav.world':      'Путешествия',
      'nav.school':     'Школа',
      'nav.business':   'Бизнесу',
      'nav.faq':        'FAQ',
      'nav.shop':       'Магазин',
      'nav.blog':       'Новости',
      'nav.prices':     'Цены',
      'nav.yachts':     'Аренда яхты',
      'nav.mk':         'Мастер-класс',
      'nav.regatta':    'Регата выходного дня',
      'nav.team':       'Тимбилдинг',
      'nav.regattas':   'Международные регаты',
      'nav.cruises':    'Дальние круизы',
      'nav.charter':    'Индивидуальный чартер'
    },
    en: {
      'nav.baku':       'Sailing in Baku',
      'nav.world':      'Travels',
      'nav.school':     'School',
      'nav.business':   'For business',
      'nav.faq':        'FAQ',
      'nav.shop':       'Shop',
      'nav.blog':       'News',
      'nav.prices':     'Prices',
      'nav.yachts':     'Yacht rental',
      'nav.mk':         'Masterclass',
      'nav.regatta':    'Weekend regatta',
      'nav.team':       'Teambuilding',
      'nav.regattas':   'International regattas',
      'nav.cruises':    'Long cruises',
      'nav.charter':    'Private charter'
    },
    az: {
      'nav.baku':       'Bakıda yelkənçilik',
      'nav.world':      'Səyahətlər',
      'nav.school':     'Məktəb',
      'nav.business':   'Biznes üçün',
      'nav.faq':        'FAQ',
      'nav.shop':       'Mağaza',
      'nav.blog':       'Xəbərlər',
      'nav.prices':     'Qiymətlər',
      'nav.yachts':     'Yaxta icarəsi',
      'nav.mk':         'Masterklas',
      'nav.regatta':    'Həftəsonu regatası',
      'nav.team':       'Timbildinq',
      'nav.regattas':   'Beynəlxalq regatalar',
      'nav.cruises':    'Uzaq kruizlər',
      'nav.charter':    'Fərdi çarter'
    }
  };
  var t = T[lang] || T.ru;

  /* ─── Apply translations ───────────────────────── */
  document.querySelectorAll('#yz-nav [data-label]').forEach(function (el) {
    var key = el.dataset.label;
    if (t[key] != null) el.textContent = t[key];
  });

  /* ─── Build href for each slug. AZ — с префиксом /az/ для slug-страниц.
     Главная: yacht.az/ для AZ, /ru/ и /en/ для остальных. */
  function buildHref(slug) {
    if (!slug) return '#';
    return '/' + lang + '/' + slug;
  }
  function buildHomeHref() {
    if (lang === 'az') return '/';
    return '/' + lang + '/';
  }

  /* ─── Apply hrefs ──────────────────────────────── */
  document.querySelectorAll('#yz-nav [data-yz-link]').forEach(function (el) {
    el.setAttribute('href', buildHref(el.dataset.yzLink));
  });
  document.querySelectorAll('#yz-nav [data-yz-home]').forEach(function (el) {
    el.setAttribute('href', buildHomeHref());
  });

  /* ─── Language switcher ───────────────────────── */
  var langLabels = { ru: 'RU', en: 'EN', az: 'AZ' };
  var currentLangEl = document.querySelector('.yz-nav-lang-current');
  if (currentLangEl) currentLangEl.textContent = langLabels[lang];

  /* Подменяем href language switcher: каждая ссылка ведёт на ту же
     страницу в другом языке. Для главной — особый case (AZ без префикса). */
  function langSwitchHref(targetLang) {
    var p = path;
    /* Убрать текущий префикс */
    p = p.replace(/^\/(ru|en|az)(\/|$)/, '/');
    if (p === '/' || p === '') p = '/';
    /* Если current path был корнем сайта = AZ-главная */
    if (p === '/' && (lang === 'az' || (lang === 'ru' && path === '/ru/') || (lang === 'en' && path === '/en/'))) {
      return targetLang === 'az' ? '/' : '/' + targetLang + '/';
    }
    return targetLang === 'az' ? '/az' + p : '/' + targetLang + p;
  }
  document.querySelectorAll('#yz-nav [data-yz-lang]').forEach(function (el) {
    var target = el.dataset.yzLang;
    el.setAttribute('href', langSwitchHref(target));
    if (target === lang) el.classList.add('is-active');
  });

  /* ─── Burger menu toggle ───────────────────────── */
  var burger = document.querySelector('.yz-nav-burger');
  var mobile = document.querySelector('.yz-nav-mobile');
  if (burger && mobile) {
    burger.addEventListener('click', function () {
      var open = burger.getAttribute('aria-expanded') === 'true';
      burger.setAttribute('aria-expanded', open ? 'false' : 'true');
      mobile.classList.toggle('is-open');
      mobile.setAttribute('aria-hidden', open ? 'true' : 'false');
      document.body.classList.toggle('yz-nav-locked', !open);
    });
    /* Закрытие при клике по ссылке внутри */
    mobile.addEventListener('click', function (e) {
      if (e.target.closest('a')) {
        burger.setAttribute('aria-expanded', 'false');
        mobile.classList.remove('is-open');
        mobile.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('yz-nav-locked');
      }
    });
  }

  /* ─── Transparent navbar logic.
     На главных страницах (/, /ru/, /en/, /az/) меню изначально
     прозрачное (поверх hero-фото с белым текстом). При скролле
     >80px — становится navy.
     На внутренних — сразу navy (is-solid). */
  var nav = document.getElementById('yz-nav');
  if (nav) {
    var isHomepage = /^\/(?:(ru|en|az)\/?)?$/.test(path);
    var spacer = document.getElementById('yz-nav-spacer');
    if (!isHomepage) {
      nav.classList.add('is-solid');
      /* На внутренних страницах показываем spacer чтобы контент
         не уходил под fixed-меню */
      if (spacer) spacer.style.display = 'block';
    } else {
      var onScroll = function () {
        if (window.scrollY > 80) {
          nav.classList.add('is-solid');
        } else {
          nav.classList.remove('is-solid');
        }
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }
  }
})();
</script>
